<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
            text-align: center;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button,
        .create-account-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button {
            background: #007BFF;
            color: white;
        }

        button:hover {
            background: #0056b3;
        }

        .create-account-btn {
            background: #28a745;
            color: white;
            text-decoration: none;
            display: inline-block;
        }

        .create-account-btn:hover {
            background: #1e7e34;
        }

        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <h2>Connexion</h2>

        <form action="/login" method="post">
            <input type="email" name="mail" placeholder="Email" required>
            <input type="password" name="password" placeholder="Mot de passe" required>

            <button type="submit">Se connecter</button>
        </form>

        <div class="footer">
            Pas encore de compte ? <a href="/create_user">S'inscrire</a>
        </div>
    </div>

</body>

</html>
